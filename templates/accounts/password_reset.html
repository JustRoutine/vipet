{% extends "base.html" %}
{% load static %}

{% block title %}Mot de passe oublié — VIPET{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-10rem)] flex items-center justify-center py-12 px-4 bg-cream dark:bg-dark transition-colors duration-300">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="{% static 'images/brand/logo.png' %}" alt="VIPET" class="h-16 w-16 mx-auto mb-4" />
      <h1 class="text-2xl font-heading font-bold text-gray-900 dark:text-white">Réinitialiser le mot de passe</h1>
      <p class="text-gray-500 dark:text-white/50 text-sm mt-2">Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <div class="bg-white dark:bg-dark-800 border border-gray-100 dark:border-white/5 rounded-2xl shadow-sm p-8">
      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="id_email" class="block text-sm font-medium text-gray-700 dark:text-white/70 mb-1.5">Email</label>
          <input type="email" name="email" id="id_email" required
                 class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-dark-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition" />
        </div>
        <button type="submit"
                class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl transition-all duration-300 glow-pink">
          Envoyer le lien
        </button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-500 dark:text-white/50">
        <a href="{% url 'accounts:login' %}" class="text-primary hover:underline">← Retour à la connexion</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
