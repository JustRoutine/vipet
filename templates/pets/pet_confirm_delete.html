{% extends "base.html" %}

{% block title %}Supprimer {{ object.name }} — VIPET{% endblock %}

{% block content %}
<div class="py-8 sm:py-12 bg-white dark:bg-dark transition-colors duration-300 min-h-[calc(100vh-10rem)]">
  <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">

    <div class="bg-white dark:bg-dark-800 border border-gray-100 dark:border-white/5 rounded-2xl shadow-sm p-8 text-center">
      <span class="text-5xl block mb-4">⚠️</span>
      <h1 class="text-xl font-heading font-bold text-gray-900 dark:text-white mb-2">Supprimer {{ object.name }} ?</h1>
      <p class="text-gray-500 dark:text-white/50 text-sm mb-8">Cette action est irréversible.</p>

      <form method="post" class="space-y-3">
        {% csrf_token %}
        <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-xl transition">
          Oui, supprimer
        </button>
        <a href="{% url 'pets:pet_list' %}"
           class="w-full block text-center py-3 border border-gray-200 dark:border-white/10 text-gray-700 dark:text-white/70 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition">
          Annuler
        </a>
      </form>
    </div>

  </div>
</div>
{% endblock %}
