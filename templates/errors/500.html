<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 – Erreur serveur | VIPET</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', system-ui, sans-serif;
      background-color: #1A1A1A;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: 6rem;
      font-weight: 700;
      color: #FF007F;
      line-height: 1;
    }
    .title {
      font-size: 1.75rem;
      margin-top: 1rem;
    }
    .message {
      color: #666666;
      margin-top: 0.75rem;
      max-width: 480px;
    }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background-color: #FF007F;
      color: #FFFFFF;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <p class="code">500</p>
  <h1 class="title">Erreur interne du serveur</h1>
  <p class="message">
    Un problème est survenu de notre côté. Nous en avons été informés et nous y travaillons.
    Veuillez réessayer dans quelques instants.
  </p>
  <a href="/" class="btn">Retour à l'accueil</a>
</body>
</html>
